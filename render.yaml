services:
  - type: web
    name: trustcart
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: SERVER_ADDRESS
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0
