<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Autoship</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="container"><a th:href="@{/}">← Back</a><h1>Autoship Essentials</h1><p>Subscribe to repeat-use products by your preferred frequency.</p><p class="success" th:text="${success}"></p><div class="grid"><article class="product-card" th:each="p:${eligibleProducts}"><img class="product-photo" th:src="${p.imageUrl}"><div class="product-body"><strong th:text="${p.name}"></strong><div class="price">₱<span th:text="${p.price}"></span></div><form th:action="@{/autoship/create}" method="post"><input type="hidden" name="productId" th:value="${p.id}"><select name="frequency"><option>WEEKLY</option><option>EVERY_2_WEEKS</option><option selected>MONTHLY</option><option>EVERY_2_MONTHS</option></select><input name="quantity" type="number" min="1" value="1"><button class="btn btn-primary">Subscribe</button></form></div></article></div></main></body></html>
