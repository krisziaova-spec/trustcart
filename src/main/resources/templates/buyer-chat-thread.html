<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Chat with Seller | TrustCart</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><nav class="nav"><div class="nav-inner"><a class="logo" th:href="@{/}"><img th:src="@{/img/logo-uploaded.png}" alt="TrustCart"></a><div class="nav-links"><a th:href="@{/buyer/messages}">Messages</a><a th:href="@{/support/contact}">Support</a><a th:href="@{/}">Shop</a></div></div></nav>
<main class="container chat-page"><section class="table-card"><div class="section-title"><div><span class="section-pill">Protected Seller Chat</span><h1 th:text="${thread.subject}">Chat</h1><p class="muted">Seller: <strong th:text="${thread.seller.storeName}">Store</strong>. Keep all agreements and payment inside TrustCart.</p></div><a class="btn btn-outline" th:href="@{/buyer/messages}">Back to Inbox</a></div><div class="chat-box"><div th:each="m:${messages}" th:class="${m.senderRole == 'BUYER' ? 'chat-bubble me' : 'chat-bubble'}"><strong th:text="${m.senderName}">Name</strong><small th:text="${#temporals.format(m.createdAt, 'MMM dd, HH:mm')}">Date</small><p th:text="${m.message}">Message</p></div><p th:if="${messages.isEmpty()}" class="muted">Start the conversation below.</p></div><form th:action="@{/buyer/messages/{id}/reply(id=${thread.id})}" method="post" class="chat-form"><textarea name="message" rows="4" placeholder="Type your message to the seller" required></textarea><button class="btn btn-primary">Send Message</button></form></section></main></body></html>
