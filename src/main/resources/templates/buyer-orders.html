<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>My Orders | TrustCart</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><nav class="nav"><div class="nav-inner"><a class="logo" th:href="@{/}"><img th:src="@{/img/logo-uploaded.png}" alt="TrustCart"></a><div class="nav-links"><a th:href="@{/}">Shop</a><a th:href="@{/buyer/messages}">Messages</a><a th:href="@{/support/contact}">Support</a><a th:href="@{/buyer/logout}">Logout</a></div></div></nav><main class="container"><section class="table-card"><div class="section-title"><div><span class="section-pill">Buyer Dashboard</span><h1>My Orders</h1><p class="muted">Track orders, escrow status, and leave verified reviews with proof attachments.</p></div><a class="btn btn-outline" th:href="@{/}">Back to Shop</a></div><table><tr><th>Order</th><th>Status</th><th>Payment</th><th>Escrow</th><th>Total</th><th>Actions</th></tr><tr th:each="o:${orders}"><td><strong th:text="${o.orderCode}">TC</strong><br><small th:text="${#temporals.format(o.createdAt, 'MMM dd, yyyy HH:mm')}">Date</small></td><td><span class="badge" th:text="${o.orderStatus}">Status</span></td><td th:text="${o.paymentStatus}">Payment</td><td th:text="${o.escrowStatus}">Escrow</td><td>₱<span th:text="${o.total}">0</span></td><td><a class="btn btn-outline" th:href="@{/track(code=${o.orderCode})}">Track</a><a class="btn btn-outline" th:href="@{/support/contact}">Open Ticket</a></td></tr><tr th:if="${orders.isEmpty()}"><td colspan="6">No orders yet.</td></tr></table></section></main></body></html>
