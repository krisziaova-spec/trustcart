<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Buyer Register</title><link rel="icon" th:href="@{/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="auth-card"><img th:src="@{/img/logo-uploaded.png}" class="auth-logo"><h1>Create Buyer Account</h1><p class="error" th:text="${error}"></p><form method="post"><input name="fullName" placeholder="Full name" required><input name="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><input name="phone" placeholder="Phone"><input name="defaultAddress" placeholder="Shipping address"><button class="btn btn-primary">Register</button></form><a th:href="@{/buyer/login}">Already have account?</a></main></body></html>
