<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart</title>
    <link rel="icon" th:href="@{/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="container">
    <a th:href="@{/}">← Back to shop</a>
    <h1>Your Cart</h1>
    <p class="error" th:text="${error}"></p>
    <div class="table-card cart-card">
        <table>
            <tr><th>Product</th><th>Fulfillment</th><th>Qty</th><th>Total</th><th></th></tr>
            <tr th:each="item:${items}">
                <td class="cart-product-cell"><img class="cart-thumb" th:src="${item.product.imageUrl}" th:alt="${item.product.photoAltText}"><div><strong th:text="${item.product.name}">Product</strong><br><small th:text="${item.product.seller.storeName}">Seller</small></div></td>
                <td><span class="badge shield" th:if="${item.product.fulfilledByTrustCart}">Fulfilled by TrustCart</span><span class="badge" th:unless="${item.product.fulfilledByTrustCart}">Fulfilled by Seller</span></td>
                <td>
                    <div class="qty-controls">
                        <form th:action="@{/cart/update/{id}(id=${item.product.id})}" method="post"><input type="hidden" name="quantity" th:value="${item.qty - 1}"><button class="qty-btn" type="submit">−</button></form>
                        <span th:text="${item.qty}">1</span>
                        <form th:action="@{/cart/update/{id}(id=${item.product.id})}" method="post"><input type="hidden" name="quantity" th:value="${item.qty + 1}"><button class="qty-btn" type="submit">+</button></form>
                    </div>
                </td>
                <td>₱<span th:text="${item.line}"></span></td>
                <td><form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post"><button class="delete-icon" title="Remove item">🗑</button></form></td>
            </tr>
            <tr th:if="${items.isEmpty()}"><td colspan="5">Your cart is empty.</td></tr>
        </table>
        <h2>Subtotal: ₱<span th:text="${subtotal}"></span></h2>
        <a class="btn btn-primary" th:href="@{/checkout}">Proceed to Checkout</a>
    </div>
</main>
</body>
</html>
