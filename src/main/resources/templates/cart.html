<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Cart</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="container"><a th:href="@{/}">← Back to shop</a><h1>Your Cart</h1><p class="error" th:text="${error}"></p><div class="table-card"><table><tr><th>Product</th><th>Qty</th><th>Total</th><th></th></tr><tr th:each="item:${items}"><td th:text="${item.product.name}"></td><td th:text="${item.qty}"></td><td>₱<span th:text="${item.line}"></span></td><td><form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post"><button>Remove</button></form></td></tr></table><h2>Subtotal: ₱<span th:text="${subtotal}"></span></h2><a class="btn btn-primary" th:href="@{/checkout}">Proceed to Checkout</a></div></main></body></html>
