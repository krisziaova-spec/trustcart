<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Checkout</title><link rel="icon" th:href="@{/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="container"><a th:href="@{/cart}">← Back to cart</a><h1>Protected Checkout</h1><section class="checkout-grid"><form method="post" class="form-card"><input name="fullName" th:value="${buyer.fullName}" placeholder="Full name" required><input name="email" th:value="${buyer.email}" placeholder="Email" required><input name="phone" th:value="${buyer.phone}" placeholder="Phone"><textarea name="shippingAddress" placeholder="Shipping Address" th:text="${buyer.defaultAddress}"></textarea><select name="paymentMethod"><option>Cash on Delivery</option><option>GCash Payment</option><option>Maya Payment</option><option>Credit/Debit Card</option><option>Bank Transfer</option></select><input name="discountCode" placeholder="Discount code e.g. WELCOME10"><label><input type="checkbox" name="ecoPackaging" value="true"> Eco-packaging + ₱10</label><label><input type="checkbox" name="noExtraPlastic" value="true"> No extra plastic</label><label><input type="checkbox" name="consolidatedDelivery" value="true"> Consolidated eco delivery</label><select name="deliveryOption"><option value="STANDARD_DELIVERY">Standard Delivery</option><option value="PICKUP_HUB">TrustCart Pickup Hub</option></select><input name="pointsToRedeem" type="number" value="0" min="0" th:max="${buyer.loyaltyPointsBalance}"><button class="btn btn-primary">Place Order</button></form><div class="summary-card"><h2>Order Summary</h2><p>Subtotal: ₱<span th:text="${subtotal}"></span></p><p>Available TrustPoints: <strong th:text="${buyer.loyaltyPointsBalance}"></strong></p><p class="platform-warning">All orders must remain inside TrustCart to stay protected.</p></div></section></main></body></html>
