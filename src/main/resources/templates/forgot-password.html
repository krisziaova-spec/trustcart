<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <link rel="icon" th:href="@{/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="auth-card">
    <img th:src="@{/img/logo-uploaded.png}" class="auth-logo" alt="TrustCart logo" onerror="this.onerror=null;this.src='/img/products/placeholder-product.png';">
    <p class="muted">Account Recovery</p>
    <h1>Forgot Password</h1>
    <p class="error" th:text="${error}"></p>
    <p class="success" th:text="${success}"></p>
    <div class="tabs">
        <a class="tab" th:classappend="${type == 'buyer'} ? ' active'" th:href="@{/forgot-password(type='buyer')}">Buyer</a>
        <a class="tab" th:classappend="${type == 'seller'} ? ' active'" th:href="@{/forgot-password(type='seller')}">Seller</a>
    </div>
    <form method="post" th:action="@{/forgot-password}">
        <input type="hidden" name="type" th:value="${type}">
        <input name="email" type="email" placeholder="Enter account email" required>
        <input name="newPassword" type="password" placeholder="New password, minimum 6 characters" required minlength="6">
        <button class="btn btn-primary">Reset Password</button>
    </form>
    <p class="tiny">Prototype note: this resets the password directly for demo purposes. In production, this should send a secure reset link by email.</p>
    <div class="auth-links">
        <a th:href="@{/buyer/login}">Buyer login</a>
        <a th:href="@{/seller/login}">Seller login</a>
    </div>
</main>
</body>
</html>
