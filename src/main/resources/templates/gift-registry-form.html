<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Create Gift Registry</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><nav class="nav"><div class="nav-inner"><a class="logo" th:href="@{/}"><img th:src="@{/img/logo-uploaded.png}" alt="TrustCart"></a><div class="nav-links"><a th:href="@{/}">Shop</a><a th:href="@{/registry}">Gift Registry</a><a th:href="@{/cart}">Cart (<span th:text="${cartCount}">0</span>)</a></div></div></nav>
<main class="container"><section class="form-card auth-card wide"><span class="eyebrow green">Create Registry</span><h1>Create a protected gift registry</h1><p class="muted">Good for baby showers, newlyweds, birthdays, housewarming, graduation, and holiday wishlists. Recipient exact address remains hidden.</p><form th:action="@{/registry/create}" method="post"><label>Registry name</label><input name="registryName" placeholder="Baby Essentials for Ana" required><label>Registry type</label><select name="registryType" required><option>Baby Shower</option><option>Wedding / Newlywed</option><option>Birthday</option><option>Housewarming</option><option>Graduation</option><option>Holiday Gift List</option><option>Personal Wishlist</option></select><label>Recipient name</label><input name="recipientName" placeholder="Ana Santos" required><label>Recipient email optional</label><input name="recipientEmail" type="email" placeholder="recipient@email.com"><div class="form-grid"><div><label>Event date optional</label><input name="eventDate" type="date"></div><div><label>Protected delivery city</label><input name="deliveryCity" placeholder="San Pablo City, Laguna"></div></div><label>Registry note</label><textarea name="registryNote" rows="4" placeholder="Preferred colors, sizes, sustainable options, or gift reminders."></textarea><button class="btn btn-primary" type="submit">Create Shareable Registry</button></form></section></main></body></html>
