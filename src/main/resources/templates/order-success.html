<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Order Success</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="container"><section class="success-card premium-success"><span class="section-pill">Protected Order Created</span><h1>Order Placed Successfully</h1><p>Your protected order code is <strong th:text="${order.orderCode}">TC</strong></p><div class="seller-stats-grid"><article class="stat-card"><span>Total</span><strong>₱<span th:text="${order.total}">0</span></strong></article><article class="stat-card"><span>Payment</span><strong th:text="${order.paymentStatus}">Protected</strong></article><article class="stat-card"><span>Escrow</span><strong th:text="${order.escrowStatus}">TrustCart Protected</strong></article><article class="stat-card"><span>Tracking</span><strong th:text="${order.trackingStage}">Order confirmed</strong></article></div><div class="footer-actions"><a class="btn btn-primary" th:href="@{/track(code=${order.orderCode})}">Track Order</a><a class="btn btn-outline" th:href="@{/buyer/orders}">My Orders</a><a class="btn btn-outline" th:href="@{/}">Continue Shopping</a></div></section></main></body></html>
