<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Start Selling</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="auth-card wide"><h1>Start Selling</h1><p>Exact location is required for verification but hidden from buyers.</p><form method="post"><input name="storeName" placeholder="Store name" required><input name="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><input name="businessType" placeholder="Seller type, e.g. Local MSME" required><input name="phone" placeholder="Phone"><input name="storeExactAddress" placeholder="Exact store address for verification" required><input name="storeCity" placeholder="City" required><input name="storeProvince" placeholder="Province" required><div class="form-grid"><input name="latitude" placeholder="Latitude"><input name="longitude" placeholder="Longitude"></div><button class="btn btn-primary">Create Seller Access</button></form></main></body></html>
