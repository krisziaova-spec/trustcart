<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reply to Buyer | TrustCart</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><main class="container chat-page seller-dashboard-page"><section class="table-card"><div class="section-title"><div><span class="section-pill">Protected Buyer Chat</span><h1 th:text="${thread.subject}">Chat</h1><p class="muted">Buyer: <strong th:text="${thread.buyer.fullName}">Buyer</strong>. Do not request off-platform payment.</p></div><a class="btn btn-outline" th:href="@{/seller/messages}">Back to Inbox</a></div><div class="chat-box"><div th:each="m:${messages}" th:class="${m.senderRole == 'SELLER' ? 'chat-bubble me' : 'chat-bubble'}"><strong th:text="${m.senderName}">Name</strong><small th:text="${#temporals.format(m.createdAt, 'MMM dd, HH:mm')}">Date</small><p th:text="${m.message}">Message</p></div></div><form th:action="@{/seller/messages/{id}/reply(id=${thread.id})}" method="post" class="chat-form"><textarea name="message" rows="4" placeholder="Type your reply to the buyer" required></textarea><button class="btn btn-primary">Send Reply</button></form></section></main></body></html>
