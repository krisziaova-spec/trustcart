<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Seller Dashboard</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="container"><h1>Seller Dashboard</h1><p>Welcome, <strong th:text="${seller.storeName}"></strong></p><div class="feature-strip"><a th:href="@{/seller/products/new}"><strong>Add Product</strong><span>Publish directly</span></a><a th:href="@{/seller/discounts/new}"><strong>Create Discount Code</strong><span>Seller-managed promos</span></a><a th:href="@{/}"><strong>View Shop</strong><span>See marketplace</span></a><form th:action="@{/seller/logout}" method="post"><button class="btn btn-outline">Logout</button></form></div><h2>Your Products</h2><div class="grid"><article class="product-card" th:each="p:${products}"><img class="product-photo" th:src="${p.imageUrl}"><div class="product-body"><strong th:text="${p.name}"></strong><p>₱<span th:text="${p.price}"></span></p><span class="badge" th:text="${p.category.displayName}"></span></div></article></div><h2>Your Discount Codes</h2><div class="table-card"><table><tr><th>Code</th><th>Description</th><th>Discount</th></tr><tr th:each="d:${discounts}"><td th:text="${d.code}"></td><td th:text="${d.description}"></td><td><span th:text="${d.percentOff}"></span>% / ₱<span th:text="${d.amountOff}"></span></td></tr></table></div></main></body></html>
