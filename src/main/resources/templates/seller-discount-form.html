<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Discount</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="auth-card wide">
    <a th:href="@{/seller/dashboard}">← Back to dashboard</a>
    <h1>Create Discount / Promo Code</h1>
    <p class="error" th:text="${error}"></p>
    <form th:action="@{/seller/discounts}" method="post" class="stacked-form">
        <label>Promo code</label>
        <input name="code" placeholder="Code e.g. LOCAL10" required>
        <label>Description</label>
        <input name="description" placeholder="Description" required>
        <div class="form-grid">
            <div><label>Minimum spend</label><input name="minimumSpend" type="number" step="0.01" value="0"></div>
            <div><label>Percent off</label><input name="percentOff" type="number" value="0"></div>
        </div>
        <label>Fixed amount off</label>
        <input name="amountOff" type="number" step="0.01" value="0">
        <label><input type="checkbox" name="firstOrderOnly" value="true"> First order only</label>
        <label><input type="checkbox" name="subscriptionBoost" value="true"> Mark as autoship / subscription promo</label>
        <button class="btn btn-primary">Create Code</button>
    </form>
</main>
</body>
</html>
