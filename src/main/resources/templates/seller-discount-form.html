<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Create Discount</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="auth-card wide"><h1>Create Discount Code</h1><p class="error" th:text="${error}"></p><form th:action="@{/seller/discounts}" method="post"><input name="code" placeholder="Code e.g. LOCAL10" required><input name="description" placeholder="Description" required><input name="minimumSpend" type="number" step="0.01" value="0"><input name="percentOff" type="number" value="0"><input name="amountOff" type="number" step="0.01" value="0"><label><input type="checkbox" name="firstOrderOnly" value="true"> First order only</label><button class="btn btn-primary">Create Code</button></form></main></body></html>
