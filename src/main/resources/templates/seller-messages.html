<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Seller Messages | TrustCart</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><main class="container seller-dashboard-page"><div class="seller-dashboard-head"><div><span class="section-pill">Seller Inbox</span><h1>Buyer Chats</h1><p>Respond to buyers while keeping transactions protected inside TrustCart.</p></div><div class="footer-actions"><a class="btn btn-outline" th:href="@{/seller/dashboard}">Dashboard</a><form th:action="@{/seller/logout}" method="post"><button class="btn btn-outline">Logout</button></form></div></div><section class="table-card"><table><tr><th>Buyer</th><th>Subject</th><th>Last Message</th><th>Status</th><th>Open</th></tr><tr th:each="t:${threads}"><td th:text="${t.buyer.fullName}">Buyer</td><td><strong th:text="${t.subject}">Subject</strong><br><small th:if="${t.product != null}" th:text="${'Product: ' + t.product.name}">Product</small></td><td><span th:text="${t.lastMessagePreview}">Preview</span><br><small th:text="${#temporals.format(t.updatedAt, 'MMM dd, yyyy HH:mm')}">Date</small></td><td><span class="badge" th:text="${t.status}">OPEN</span></td><td><a class="btn btn-primary" th:href="@{/seller/messages/{id}(id=${t.id})}">Open</a></td></tr><tr th:if="${threads.isEmpty()}"><td colspan="5">No buyer chats yet.</td></tr></table></section></main></body></html>
