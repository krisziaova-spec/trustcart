<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Add Product - TrustCart</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body>
<nav class="nav"><div class="nav-inner"><a class="logo" th:href="@{/}"><span class="logo-badge">TC</span> TrustCart</a><div class="nav-links"><a th:href="@{/seller/dashboard}">Seller Dashboard</a></div></div></nav>
<main class="container">
    <section class="card" style="max-width:860px;margin:auto">
        <h1>Add Product for Approval</h1>
        <p class="platform-note">New products are pending by default. Admin must approve before the item appears in the buyer marketplace.</p>
        <form th:action="@{/seller/products}" method="post">
            <label>Product Name</label><input required name="name">
            <label>Description</label><textarea required name="description"></textarea>
            <div class="form-grid">
                <div><label>Category</label><select required name="category"><option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.displayName}"></option></select></div>
                <div><label>Price</label><input required type="number" step="0.01" min="1" name="price"></div>
                <div><label>Stock</label><input required type="number" min="0" name="stock"></div>
                <div><label>Sustainability Tag</label><input required name="sustainabilityTag" placeholder="Plastic-Free, Locally Sourced, etc."></div>
            </div>
            <label>Product Origin</label><input name="productOrigin" placeholder="Philippines / Verified source / Local MSME source">
            <label>Warranty / Buyer Protection Note</label><input name="warrantyPolicy" placeholder="7-day buyer protection, replacement support, etc.">
            <label>Product Photo URL</label><input name="imageUrl" placeholder="Paste product image URL. If blank, TrustCart will use a marketplace-ready placeholder.">
            <h2>Eco and Trust Declarations</h2>
            <div class="option-card-grid">
                <label class="option-card"><input type="checkbox" name="ecoFriendly" value="true"><strong>Eco-Friendly Product</strong><span>Product or packaging supports lower waste.</span></label>
                <label class="option-card"><input type="checkbox" name="plasticFreePackaging" value="true"><strong>Plastic-Free Packaging</strong><span>No unnecessary single-use plastic packaging.</span></label>
                <label class="option-card"><input type="checkbox" name="locallySourced" value="true"><strong>Locally Sourced</strong><span>Supports local Filipino suppliers or MSMEs.</span></label>
                <label class="option-card"><input type="checkbox" name="lowWasteDelivery" value="true"><strong>Low-Waste Delivery</strong><span>Product can support consolidated or minimal packaging delivery.</span></label>
                <label class="option-card"><input type="checkbox" name="subscriptionEligible" value="true"><strong>Autoship Eligible</strong><span>Recommended for household, grocery, pet, beauty, wellness, and repeat-use products.</span></label>
            </div>
            <label>Autoship Savings Percent</label><input type="number" name="subscriptionDiscountPercent" min="0" max="50" value="5">
            <button class="btn btn-primary" type="submit" style="width:100%;margin-top:14px">Submit Product for Admin Approval</button>
        </form>
    </section>
</main>
</body>
</html>
