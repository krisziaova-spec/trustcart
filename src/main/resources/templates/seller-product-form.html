<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><title>Add Product</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><main class="auth-card wide"><h1>Add Product</h1><form th:action="@{/seller/products}" method="post"><input name="name" placeholder="Product name" required><textarea name="description" placeholder="Description"></textarea><select name="category"><option th:each="cat:${categories}" th:value="${cat}" th:text="${cat.displayName}"></option></select><input name="price" type="number" step="0.01" placeholder="Price" required><input name="stock" type="number" placeholder="Stock" required><input name="imageUrl" placeholder="Product photo URL" required><label><input type="checkbox" name="ecoFriendly" value="true"> Eco-friendly</label><label><input type="checkbox" name="locallySourced" value="true"> Locally sourced</label><label><input type="checkbox" name="subscriptionEligible" value="true"> Autoship eligible</label><label><input type="checkbox" name="tryOnEligible" value="true"> Virtual Try-On eligible</label><select name="tryOnGender"><option value="">No Try-On Gender</option><option>MEN</option><option>WOMEN</option></select><input name="tryOnAssetUrl" placeholder="Try-on overlay URL e.g. /img/tryon/men-polo.svg"><button class="btn btn-primary">Publish Product</button></form></main></body></html>
