<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Store Profile</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="auth-card wide">
    <a th:href="@{/seller/dashboard}">← Back to dashboard</a>
    <h1>Edit Store Profile</h1>
    <p class="muted">This controls the public storefront. Exact address remains hidden from buyers.</p>
    <form th:action="@{/seller/profile}" method="post" enctype="multipart/form-data" class="stacked-form">
        <label>Store name</label>
        <input name="storeName" th:value="${seller.storeName}" required>
        <div class="form-grid">
            <div><label>Business type</label><input name="businessType" th:value="${seller.businessType}" placeholder="Daily essentials seller, local MSME, sustainable home goods"></div>
            <div><label>Phone</label><input name="phone" th:value="${seller.phone}" placeholder="Seller contact number"></div>
        </div>
        <label>Store description</label>
        <textarea name="storeDescription" placeholder="Describe your store, products, sustainability promise, and fulfillment coverage" th:text="${seller.storeDescription}"></textarea>
        <div class="form-grid">
            <div><label>Upload store profile photo</label><input name="storeProfileImage" type="file" accept="image/*"></div>
            <div><label>Upload store banner</label><input name="storeBannerImage" type="file" accept="image/*"></div>
        </div>
        <label>Or store profile photo URL</label>
        <input name="storeProfileImageUrl" th:value="${seller.storeProfileImageUrl}" placeholder="https://... profile photo">
        <label>Or store banner URL</label>
        <input name="storeBannerImageUrl" th:value="${seller.storeBannerImageUrl}" placeholder="https://... banner image">
        <div class="form-grid">
            <div><label>Sustainability badge</label><input name="sustainabilityBadge" th:value="${seller.sustainabilityBadge}" placeholder="Plastic-Free Packaging"></div>
            <div><label>Service radius</label><input name="serviceRadiusKm" type="number" min="1" th:value="${seller.serviceRadiusKm}"></div>
        </div>
        <label>Eco commitment</label>
        <textarea name="ecoCommitment" th:text="${seller.ecoCommitment}" placeholder="How your store supports lower-waste or verified responsible commerce"></textarea>
        <div class="form-grid">
            <div><label>City / Area</label><input name="storeCity" th:value="${seller.storeCity}" placeholder="San Pablo City"></div>
            <div><label>Province</label><input name="storeProvince" th:value="${seller.storeProvince}" placeholder="Laguna"></div>
        </div>
        <div class="form-grid">
            <div><label>Latitude</label><input name="latitude" type="number" step="0.0001" th:value="${seller.latitude}"></div>
            <div><label>Longitude</label><input name="longitude" type="number" step="0.0001" th:value="${seller.longitude}"></div>
        </div>
        <label><input type="checkbox" name="pickupAvailable" value="true" th:checked="${seller.pickupAvailable}"> Pickup-capable through TrustCart partner hub</label>
        <button class="btn btn-primary" type="submit">Save Store Profile</button>
    </form>
</main>
</body>
</html>
