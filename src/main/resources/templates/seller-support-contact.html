<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Seller Support | TrustCart</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><main class="container seller-dashboard-page"><a class="btn btn-outline quick-back" href="javascript:history.back()">← Back</a><section class="form-card"><span class="section-pill">Seller Support</span><h1>Open a Seller Support Ticket</h1><p class="muted">Use this for buyer concerns, payout issues, FBT questions, product approval, or store safety issues. Attach proof if needed.</p><p class="success" th:text="${success}"></p><form th:action="@{/seller/support/contact}" method="post" enctype="multipart/form-data" class="stack-form"><input name="subject" placeholder="Concern summary" required><textarea name="message" rows="6" placeholder="Describe your seller concern" required></textarea><label>Attach proof<input type="file" name="proofFile" accept="image/*,.pdf,.doc,.docx"></label><button class="btn btn-primary">Open Seller Ticket</button><a class="btn btn-outline" th:href="@{/seller/dashboard}">Back to Dashboard</a></form></section></main></body></html>
