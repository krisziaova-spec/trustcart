<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Contact TrustCart Support</title><link rel="icon" th:href="@{/favicon.png}"><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body><nav class="nav"><div class="nav-inner"><a class="logo" th:href="@{/}"><img th:src="@{/img/logo-uploaded.png}" alt="TrustCart" onerror="this.onerror=null;this.src='/img/products/placeholder-product.png';"></a><div class="nav-links"><a th:href="@{/}">Shop</a><a th:href="@{/buyer/messages}">Messages</a><a th:href="@{/buyer/orders}" th:if="${buyerLoggedIn}">Orders</a><a th:href="@{/buyer/logout}" th:if="${buyerLoggedIn}">Logout</a><a th:href="@{/cart}">Cart</a></div></div></nav><main class="container"><a class="btn btn-outline quick-back" href="javascript:history.back()">← Back</a><section class="form-card"><span class="section-pill">Buyer Support</span><h1>Open a TrustCart Support Ticket</h1><p class="muted">Use this for concerns about a store, product, order, payment, or buyer protection. Attach proof if needed.</p><p class="success" th:text="${success}"></p><form th:action="@{/support/contact}" method="post" enctype="multipart/form-data" class="stack-form"><input name="reporterName" th:value="${buyer != null ? buyer.fullName : ''}" placeholder="Your name"><input name="reporterEmail" th:value="${buyer != null ? buyer.email : ''}" placeholder="Your email"><input name="subject" placeholder="Concern summary" required><textarea name="message" rows="6" placeholder="Describe your concern" required></textarea><label>Attach proof<input type="file" name="proofFile" accept="image/*,.pdf,.doc,.docx"></label><button class="btn btn-primary">Open Support Ticket</button></form></section></main></body></html>
